<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title | default: "Amurot" }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description | default: 'Amurot builds intelligent, minimal utility apps for calm productivity and smart workflows.' }}"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
    <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}" />
  </head>

  <body class="min-h-full bg-white text-zinc-900 antialiased">
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="relative">
      {% include header.html %}

      {{ content }}

      {% include footer.html %}
    </div>

    <script>
      document.getElementById('year').textContent = String(new Date().getFullYear());
    </script>
    <script type="module" src="{{ '/assets/app.js' | relative_url }}"></script>
  </body>
</html>
