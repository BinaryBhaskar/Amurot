<section class="relative overflow-hidden hero-minus-header flex items-center">
  <div aria-hidden="true" class="pointer-events-none absolute inset-0">
    <!-- Subtle grid -->
    <svg class="absolute inset-0 h-full w-full text-zinc-200/60" viewBox="0 0 1200 700" preserveAspectRatio="none">
      <defs>
        <pattern id="amurot-grid" width="64" height="64" patternUnits="userSpaceOnUse">
          <path d="M 64 0 L 0 0 0 64" fill="none" stroke="currentColor" stroke-width="1" />
        </pattern>
        <radialGradient id="amurot-fade" cx="50%" cy="35%" r="70%">
          <stop offset="0%" stop-color="white" stop-opacity="0.85" />
          <stop offset="55%" stop-color="white" stop-opacity="0.35" />
          <stop offset="100%" stop-color="white" stop-opacity="0" />
        </radialGradient>
        <mask id="amurot-mask">
          <rect width="1200" height="700" fill="url(#amurot-fade)" />
        </mask>
      </defs>
      <rect width="1200" height="700" fill="url(#amurot-grid)" mask="url(#amurot-mask)" />
    </svg>
    <!-- Flowing wave lines -->
    <svg class="absolute -bottom-20 left-1/2 h-[360px] w-[1200px] -translate-x-1/2 opacity-80" viewBox="0 0 1200 360" fill="none">
      <g class="amurot-drift" style="transform-origin: 50% 50%">
        <path
          d="M0 210 C 121 170, 240 250, 360 210 S 600 170, 720 210 960 250, 1200 210"
          class="stroke-current text-sky-200/70"
          stroke-width="1.25"
        />
        <path
          d="M0 250 C 160 210, 280 290, 440 250 S 720 210, 880 250 1040 290, 1200 250"
          class="stroke-current text-violet-200/55"
          stroke-width="1.25"
        />
        <path
          d="M0 290 C 140 260, 320 320, 500 290 S 780 260, 940 290 1100 320, 1200 290"
          class="stroke-current text-cyan-200/55"
          stroke-width="1.25"
        />
      </g>
    </svg>
    <!-- Soft gradient shapes (parallax + float) -->
    <div class="absolute left-1/2 top-[640px] -translate-x-1/2">
      <div class="amurot-parallax" data-parallax-layer="18">
        <div class="amurot-float h-[520px] w-[520px] rounded-full bg-linear-to-br from-sky-300/30 via-cyan-200/10 to-violet-300/30 blur-3xl"></div>
      </div>
    </div>
    <div class="absolute right-[-120px] top-20">
      <div class="amurot-parallax" data-parallax-layer="12">
        <div class="amurot-float-slower h-[420px] w-[420px] rounded-full bg-linear-to-br from-violet-300/22 via-sky-200/10 to-cyan-200/22 blur-3xl"></div>
      </div>
    </div>
    <div class="absolute -left-40 top-[220px]">
      <div class="amurot-parallax" data-parallax-layer="10">
        <div class="amurot-float h-[460px] w-[460px] rounded-full bg-linear-to-br from-cyan-200/20 via-sky-200/10 to-violet-200/20 blur-3xl"></div>
      </div>
    </div>
  </div>
  <div class="relative mx-auto max-w-6xl px-6 py-24 md:py-32">
    <div class="mx-auto max-w-2xl text-center">
      <h1 class="amurot-reveal text-balance text-4xl font-medium tracking-tight text-zinc-950 md:text-6xl">
        AI assisted utility apps for
        <span class="bg-gradient-to-r from-sky-400 via-blue-500 to-blue-400 bg-clip-text text-transparent">calm productivity</span>
      </h1>
      <p class="amurot-reveal mt-5 text-pretty text-base leading-relaxed text-zinc-600 md:text-lg" data-reveal-delay="60">
        Minimal tools that feel invisible - practical, elegant, and quietly intelligent.
      </p>
      <div class="amurot-reveal mt-10 flex items-center justify-center" data-reveal-delay="110">
        <a class="btn btn-primary border-2 border-transparent transition-all duration-200 ease-out hover:border-transparent hover:bg-gradient-to-r hover:from-sky-400 hover:via-blue-500 hover:to-blue-400 hover:text-white" href="#apps">
          View apps
        </a>
      </div>
    </div>
  </div>
  <!-- Soft white fade at bottom of hero for smooth transition -->
  <div class="pointer-events-none absolute left-0 right-0 bottom-0 h-40 w-full z-20" style="background:linear-gradient(to bottom, rgba(255,255,255,0) 60%, #fff 100%);"></div>
</section>
